name: monitoreo_app
description: Flutter monitoring application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter_dotenv: ^5.1.0
  http: ^1.2.0

  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8

  # State management
  provider: 6.1.2

  # Local storage
  shared_preferences: 2.5.3
  sqflite: ^2.3.0
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:
  assets:
    - .env
  uses-material-design: true